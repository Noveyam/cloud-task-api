apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cloud-task-api-secrets
  namespace: staging
spec:
  provider: aws
  parameters:
    region: us-east-1
    usePodIdentity: "true"
    objects: |
      - objectName: "cloud-task-api/staging/django"
        objectType: "secretsmanager"
        jmesPath:
          - path: "SECRET_KEY"
            objectAlias: "SECRET_KEY"
          - path: "SENTRY_DSN"
            objectAlias: "SENTRY_DSN"
      - objectName: "cloud-task-api/staging/postgres"
        objectType: "secretsmanager"
        jmesPath:
          - path: "DB_NAME"
            objectAlias: "DB_NAME"
          - path: "DB_USER"
            objectAlias: "DB_USER"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: "DB_HOST"
            objectAlias: "DB_HOST"
          - path: "DB_PORT"
            objectAlias: "DB_PORT"