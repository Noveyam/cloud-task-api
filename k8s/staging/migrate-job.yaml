apiVersion: batch/v1
kind: Job
metadata:
  name: cloud-task-api-migrate
  namespace: staging
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: cloud-task-api-migrate
    spec:
      restartPolicy: Never
      serviceAccountName: cloud-task-api-sa
      containers:
        - name: migrate
          image: 766158721264.dkr.ecr.us-east-1.amazonaws.com/cloud-task-api:latest
          imagePullPolicy: Always
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: cloud-task-api-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "cloud-task-api-secrets"