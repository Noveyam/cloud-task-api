apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-task-api-ingress
  namespace: staging
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:766158721264:certificate/d1283310-c7de-4bb7-a9da-d4b8176ea0c6
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health/
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  ingressClassName: alb
  rules:
    - host: staging-api.noveycloud.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloud-task-api-service
                port:
                  number: 80