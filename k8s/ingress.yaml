apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-task-api-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:766158721264:certificate/d29a2166-4d10-435a-82ea-ae203403e2ce
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
  - host: api.noveycloud.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloud-task-api-service
            port:
              number: 80
