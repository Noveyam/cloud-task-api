apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-task-api
spec:
  replicas: 2
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cloud-task-api
  template:
    metadata:
      labels:
        app: cloud-task-api
    spec:
      serviceAccountName: cloud-task-api-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cloud-task-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: 766158721264.dkr.ecr.us-east-1.amazonaws.com/cloud-task-api:4c1e056634b31dac22d55cc738eb112eb9994a5e
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: api.noveycloud.com
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: api.noveycloud.com
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          env:
            - name: RELEASE_VERSION
              value: "GIT_SHA_PLACEHOLDER"
            - name: SENTRY_ENVIRONMENT
              value: "production"
            - name: OTEL_PYTHON_DJANGO_EXCLUDED_URLS
              value: "/health/"
            - name: OTEL_PYTHON_EXCLUDED_URLS
              value: "/health/"
          envFrom:
            - configMapRef:
                name: cloud-task-api-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "cloud-task-api-secrets"
