name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cloud-task-api
  EKS_CLUSTER_NAME: cloud-task-api-eks
  K8S_NAMESPACE: default
  DEPLOYMENT_NAME: cloud-task-api
  CONTAINER_NAME: api
  HEALTHCHECK_URL: https://api.noveycloud.com/health/

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install depenedencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: test-secret-key
          DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost, 127.0.0.1, testserver
        run: |
          python manage.py test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME    

      - name: Verify cluster access
        run: |
          kubectl config current-context
          kubectl get nodes
      
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/

      - name: Deploy new image
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=$IMAGE_URI \
            -n $K8S_NAMESPACE
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME \
          -n $K8S_NAMESPACE \
          --timeout=300s
      
      - name: Verify health endpoint
        run: |
          curl --fail --silent --show-error \
            --retry 20 \
            --retry-delay 10 \
            --retry-connrefused \
            $HEALTHCHECK_URL    
      
      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n $K8S_NAMESPACE -o wide
          kubectl describe deployment/$DEPLOYMENT_NAME -n $K8S_NAMESPACE
          kubectl describe pod -n $K8S_NAMESPACE -l app=$DEPLOYMENT_NAME || true
          kubectl logs -n $K8S_NAMESPACE -l app=$DEPLOYMENT_NAME --tail=200 || true